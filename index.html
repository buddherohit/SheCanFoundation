
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>She Can Foundation | Contact Form</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="left">
        <h1>She Can Foundation</h1>
        <p>
            Empowering women through education, skill development,
            and opportunities. We would love to hear from you.
            Send us your message and we'll get back to you soon.
        </p>
    </div>

    <div class="right">
        <h2>Get In Touch</h2>

        <form id="contactForm">

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" required>
            </div>

            <div class="input-group">
                <label>Your Message</label>
                <textarea rows="5" required></textarea>
            </div>

            <button type="submit">
                Submit Message
            </button>

            <div class="success" id="successMsg">
                ✅ Form Submitted Successfully
            </div>

        </form>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
